<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Williams Racing Fan Hub</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Consistent with your login style */
      body {
        background-color: #041e42; 
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      /* 1. The Container Fix */
      .form-container {
        background: rgba(255, 255, 255, 0.1);
        padding: 2.5rem; /* Increased padding for better internal spacing */
        border-radius: 10px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 400px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-sizing: border-box; /* Ensures padding stays inside */
      }

      h2 {
        margin-bottom: 1.5rem;
        color: #00a0df;
      }

      /* 2. The Universal Input Fix */
      input {
        width: 100% !important; /* Force all inputs to fill the container */
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
        box-sizing: border-box; /* CRUCIAL: padding won't push width out */
        display: block;
      }

      /* 3. The Wrapper Fix */
      .password-wrapper, .email-wrapper {
        width: 100%;
        margin: 0 auto;
        position: relative;
        text-align: left;
      }

      .toggle-password {
        position: absolute; 
        right: 15px; 
        top: 22px; /* Adjusted to sit perfectly in the middle of a 12px padded input */
        cursor: pointer; 
        color: #00a0df; 
        font-size: 1.2rem;
        z-index: 10;
      }

      .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #00a0df;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 20px;
        transition: 0.3s;
      }

      .submit-btn:hover {
        background-color: white;
        color: #041e42;
      }

      .links { margin-top: 15px; font-size: 0.9rem; }
      .links a { color: #00a0df; text-decoration: none; }
      .home-link { display: block; margin-top: 20px; color: #0ce71e; text-decoration: none; }

      /* Border Validation states */
      input.error-border {
        border: 2px solid #ff4d4d !important;
        background: rgba(255, 77, 77, 0.1); 
        color: #ff4d4d !important;
      }
      input.success-border {
        border: 2px solid #0ce71e !important;
        color: #0ce71e !important; 
        background: rgba(12, 231, 30, 0.05);
      }
    </style>
  </head>

  <body>
    <div class="bg-motion"></div>

    <div class="form-container">
      <h2>Join the Paddock</h2>
      <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #ccc;">
        Create your account to get exclusive updates.
      </p>

      <form id="registrationForm" action="index.html">
        <input type="text" placeholder="Full Name" required />
        
        <div class="email-wrapper">
            <input type="email" id="emailInput" placeholder="Email address" required />
            <p id="emailError" style="color: #ff4d4d; font-size: 0.75rem; display: none; margin: -5px 0 10px 5px;">
                Please use @gmail.com, @yahoo.com, or @williams.com
            </p>
        </div>

        <div class="password-wrapper">
            <input type="password" id="password" placeholder="Password" required />
            <span class="toggle-password" onclick="toggleVisibility('password')">👁️</span>
        </div>

        <div class="password-wrapper">
            <input type="password" id="confirm_password" placeholder="Confirm Password" required />
            <span class="toggle-password" onclick="toggleVisibility('confirm_password')">👁️</span>
        </div>
        
        <div id="passwordStatus" style="text-align: left; font-size: 0.75rem; padding-left: 5px;">
            <p id="lengthNote" style="color: #ff4d4d; margin: 8px 0;">● Min. 8 characters</p>
            <p id="matchNote" style="color: #ff4d4d; margin: 8px 0;">● Passwords must match</p>
        </div>
        
        <button type="submit" class="submit-btn">REGISTER AS FAN</button>
      </form>

      <div class="links">
          <p>Already a member? <a href="login.html">Login here</a></p>
      </div>

      <a href="index.html" class="home-link">Back to Track</a>
    </div>

    <script>
    function toggleVisibility(id) {
        const input = document.getElementById(id);
        const icon = input.nextElementSibling;
        if (input.type === "password") {
            input.type = "text";
            icon.textContent = "🔒"; // Change icon when visible
        } else {
            input.type = "password";
            icon.textContent = "👁️";
        }
    }

    const domainRegex = /^[a-zA-Z0-9._%+-]+@(gmail\.com|yahoo\.com|williams\.com)$/i;
    const form = document.getElementById('registrationForm');
    const emailInput = document.getElementById('emailInput');
    const emailError = document.getElementById('emailError');
    const passInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm_password');
    const lengthNote = document.getElementById('lengthNote');
    const matchNote = document.getElementById('matchNote');

    // 1. REAL-TIME VALIDATION (Matches Login style)
    function validateEmail() {
        const value = emailInput.value.trim();
        if (value === "") {
            emailInput.classList.remove('error-border', 'success-border');
            emailError.style.display = 'none';
            return false;
        } else if (domainRegex.test(value)) {
            emailInput.classList.add('success-border');
            emailInput.classList.remove('error-border');
            emailError.style.display = 'none';
            return true;
        } else {
            emailInput.classList.add('error-border');
            emailInput.classList.remove('success-border');
            emailError.style.display = 'block';
            return false;
        }
    }

    // Keep your password validation as is
    function validatePasswords() {
        const pass = passInput.value;
        const confirm = confirmInput.value;
        const isLongEnough = pass.length >= 8;
        lengthNote.style.color = isLongEnough ? "#0ce71e" : "#ff4d4d";
        lengthNote.innerHTML = isLongEnough ? "✓ Min. 8 characters" : "● Min. 8 characters";
        passInput.className = isLongEnough ? "success-border" : "error-border";
        
        const isMatch = (pass === confirm) && pass !== "";
        matchNote.style.color = isMatch ? "#0ce71e" : "#ff4d4d";
        matchNote.innerHTML = isMatch ? "✓ Passwords match" : "● Passwords must match";
        confirmInput.className = isMatch ? "success-border" : "error-border";
        return isLongEnough && isMatch;
    }

    emailInput.addEventListener('input', validateEmail);
    passInput.addEventListener('input', validatePasswords);
    confirmInput.addEventListener('input', validatePasswords);

    // 2. THE STEP-BY-STEP SUBMIT HANDLER
    form.onsubmit = function(e) {
        const emailValue = emailInput.value.trim().toLowerCase();
        
        // STEP A: Validate Domain First (Mirroring Login Logic)
        if (!domainRegex.test(emailValue)) {
            e.preventDefault(); // Stop submission
            alert("Invalid Domain! Only Williams, Gmail, and Yahoo accounts are permitted.");
            
            // 1. Reset text values
            emailInput.value = "";
            passInput.value = "";
            confirmInput.value = "";

            // 2. CLEAR VISUAL BORDERS (Removes the green/red lines)
            emailInput.classList.remove("success-border", "error-border");
            passInput.classList.remove("success-border", "error-border");
            confirmInput.classList.remove("success-border", "error-border");

            // 3. RESET PASSWORD NOTES (Turns them back to Red/Neutral)
            lengthNote.style.color = "#ff4d4d";
            lengthNote.innerHTML = "● Min. 8 characters";
            matchNote.style.color = "#ff4d4d";
            matchNote.innerHTML = "● Passwords must match";

            if(emailError) emailError.style.display = "none";
            emailInput.focus();
            return; 
        }

        // STEP B: If domain is valid, check passwords
        const isPassValid = validatePasswords();
        if (!isPassValid) {
            e.preventDefault();
            alert("Hold up! Check your passwords before hitting the track.");
            return;
        }

        // Everything is valid - Set role and proceed
        localStorage.setItem("userRole", "fan");
    };
    </script>
  </body>
</html>
