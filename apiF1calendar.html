<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Williams Hub - 2026 Race Calendar</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-bg"> 
    <nav class="navbar">
        <div class="nav-container">
            
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="apiF1calendar.html" class="nav-link">Race Calendar</a>
                
                <div id="guest-links">
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="signup.html" class="nav-link">Sign Up</a>
                    <a href="saved.html" class="nav-link" style="color: #00A0E2; font-weight: bold; text-decoration: none; margin-left: 20px;">
                          ⭐ My Saved Races
                      </a>
                </div>
                
                <button id="logoutBtn" class="view-btn logout-btn" style="display: none;">Logout</button>
            </div>
        </div>
    </nav>

    <header>
        <div class="header-content">
            <h1>Global Grand Prix Circuits</h1>
            <p class="tagline">Explore the tracks where Williams Racing makes history.</p>
        </div>
    </header>

    <main class="container">
        <div class="admin-panel">
            <input type="text" id="circuitSearch" placeholder="Search Country (e.g. Monaco)...">
            <button id="fetchBtn" class="view-btn">Load 2026 Calendar</button>
        </div>

        <div id="calendarGrid" class="drivers-grid">
            <p class="pit-wall-msg">Click the button above to sync with the Pit Wall.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Williams Fan Hub | Sharee Angela Cuevas</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
