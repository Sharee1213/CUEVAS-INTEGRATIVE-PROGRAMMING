<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Saved Races | Williams Racing</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            /* Replace 'images/your-car-image.png' with your actual background image path */
            background: linear-gradient(rgba(11, 20, 38, 0.8), rgba(11, 20, 38, 0.8)), 
                        url('images/weeyums.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* The Blue Banner from your screenshot */
        .header-banner {
            background: linear-gradient(135deg, #3a53c4 0%, #2a3a8c 100%);
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .header-banner h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
        }

        .header-banner p {
            opacity: 0.8;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .content-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        .return-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4da3ff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .return-link:hover {
            color: white;
            text-decoration: underline;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* Matching your main page card style */
        .driver-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); /* Glassmorphism effect */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.3s ease;
        }

        .driver-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .round-label {
            color: #4da3ff;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .race-title {
            font-size: 1.6rem;
            margin: 10px 0;
            font-weight: 800;
        }

        .detail-item {
            margin: 10px 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-item strong {
            color: #4da3ff;
        }

        .remove-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(135deg, #cc0000 0%, #880000 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .remove-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px rgba(204, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <header class="header-banner">
        <h1>PERSONAL RACE CALENDAR</h1>
        <p>Your curated selection of the 2026 Season.</p>
    </header>

    <div class="content-container">
        <a href="apiF1calendar.html" class="return-link">← Return to F1 Calendar</a>

        <div id="savedRacesGrid" class="grid-layout">
            </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById('savedRacesGrid');

            function render() {
                const data = JSON.parse(localStorage.getItem("f1SavedRaces")) || [];

                if (data.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: rgba(255,255,255,0.05); border-radius: 15px;">
                            <h3 style="color: #4da3ff;">No races saved to your calendar yet.</h3>
                            <p>Head over to the F1 Calendar and click "Save" on your favorite circuits!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.map((race, index) => `
                    <div class="driver-card">
                        <span class="round-label">Round ${race.id}</span>
                        <h2 class="race-title">${race.name}</h2>
                        
                        <div class="detail-item">
                            <span>🏁</span> <span><strong>Circuit:</strong> ${race.circuit}</span>
                        </div>
                        <div class="detail-item">
                            <span>📍</span> <span><strong>Location:</strong> ${race.location}</span>
                        </div>
                        <div class="detail-item">
                            <span>📅</span> <span><strong>Date:</strong> ${new Date(race.date).toDateString()}</span>
                        </div>

                        <button class="remove-btn" onclick="remove(${index})">
                            🗑️ Remove from List
                        </button>
                    </div>
                `).join('');
            }

            window.remove = (index) => {
                if(confirm("Remove this race from your personal calendar?")) {
                    const data = JSON.parse(localStorage.getItem("f1SavedRaces"));
                    data.splice(index, 1);
                    localStorage.setItem("f1SavedRaces", JSON.stringify(data));
                    render();
                }
            };

            render();
        });
    </script>
</body>
</html>
